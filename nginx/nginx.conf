events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    upstream auth_service    { server auth-service:8001; }
    upstream patient_service { server patient-service:8002; }
    upstream notes_service   { server notes-service:8003; }
    upstream audit_service   { server audit-service:8004; }

    server {
        listen 80;

        # ── Frontend (SPA) ──
        root /usr/share/nginx/html;
        index index.html;

        location / {
            try_files $uri $uri/ /index.html;
        }

        # ── Login: endpoint público (sin JWT) ──
        location = /auth/login {
            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # ── Subrequest para validar JWT ──
        location = /_validate_jwt {
            internal;
            proxy_pass http://auth_service/auth/validate-token;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            proxy_set_header Authorization $http_authorization;
        }

        # ── Auth endpoints (excepto login) ──
        location /auth/ {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        # ── Doctors ──
        location /doctors/ {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        location = /doctors {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        # ── Patients ──
        location /patients/ {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://patient_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        location = /patients {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://patient_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        # ── Notes ──
        location /notes/ {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://notes_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        location = /notes {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://notes_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        # ── Audit ──
        location /audit/ {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://audit_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }

        location = /audit {
            auth_request /_validate_jwt;
            auth_request_set $user_id  $upstream_http_x_user_id;
            auth_request_set $user_rol $upstream_http_x_user_rol;

            proxy_pass http://audit_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id  $user_id;
            proxy_set_header X-User-Rol $user_rol;
        }
    }
}
